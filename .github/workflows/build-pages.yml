name: Build GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: pip }
      - run: pip install -r requirements.txt mkdocs mkdocs-material
      - name: Generate charts
        run: |
          mkdir -p site_build/images
          python - <<'PY'
          import pandas as pd, matplotlib.pyplot as plt, pathlib
          df = pd.read_csv('data/components.csv')
          counts = df['manufacturer_country'].value_counts().drop('UNK', errors='ignore').head(10)
          fig, ax = plt.subplots(figsize=(9,5))
          ax.barh(counts.index[::-1], counts.values[::-1], color='#c0392b')
          ax.set_title(f'Top-10 country origins (n={len(df):,})')
          plt.tight_layout(); plt.savefig('site_build/images/origin.png', dpi=150)
          PY
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
