name: Drone of the Week

on:
  schedule:
    # Mondays 14:00 UTC
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  open-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pick this week's drone
        id: pick
        run: |
          # Cycle through the queued drones in docs/dotw/README.md
          # In production: read from a backlog file with state.
          DRONES=(geran-4 shahed-136 lancet-3 orlan-10 wild-hornets-sting geran-3 magura-v5 spiders-web)
          WEEK=$(date +%V)
          IDX=$(( WEEK % ${#DRONES[@]} ))
          echo "drone=${DRONES[$IDX]}" >> $GITHUB_OUTPUT
      - name: Open issue
        uses: actions/github-script@v7
        with:
          script: |
            const drone = '${{ steps.pick.outputs.drone }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Drone of the Week: ${drone}`,
              body: `This week's profile: **${drone}**\n\n` +
                    `See \`docs/drones/${drone}.md\` and \`data/components.csv\` ` +
                    `for the latest forensic data.\n\n` +
                    `Cross-post to your channels with the chart at ` +
                    `\`images/origin_countries_top10.png\`.`,
              labels: ['dotw'],
            });
